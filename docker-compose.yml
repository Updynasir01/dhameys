version: '3.9'
# Dhameys Airlines — Local Dev Stack (MongoDB Edition)
# Usage: docker-compose up -d

services:
  mongodb:
    image: mongo:7.0
    container_name: dhameys_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: dhameys_user
      MONGO_INITDB_ROOT_PASSWORD: devpassword123
      MONGO_INITDB_DATABASE:      dhameys
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.2
    container_name: dhameys_mongoexpress
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: dhameys_user
      ME_CONFIG_MONGODB_ADMINPASSWORD: devpassword123
      ME_CONFIG_MONGODB_SERVER:        mongodb
      ME_CONFIG_BASICAUTH_USERNAME:    admin
      ME_CONFIG_BASICAUTH_PASSWORD:    dhameys123
    depends_on:
      - mongodb

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: dhameys_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: dhameys_mq
      RABBITMQ_DEFAULT_PASS: devpassword123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongo_data:
  rabbitmq_data:
